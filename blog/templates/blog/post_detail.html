{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Blog de Fabián</title>
    <link rel="stylesheet" href="{% static 'css/blog.css' %}">
</head>
<body>
    <header>
        <h1><a href="/">Django Girls Blog</a></h1>
    </header>

    <main class="content">
        {% for post in posts %}
            <article class="post">
                <div class="date">
                    Publicado el: {{ post.published_date|date:"d M Y" }}
                </div>
                <h2><a href="">{{ post.title }}</a></h2>
                <p>{{ post.text|linebreaksbr|truncatechars:200 }}</p>
            </article>
        {% endfor %}
    </main>
</body>
</html>
